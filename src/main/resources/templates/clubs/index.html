<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Clubs</title>
    <style>
    body { font-family: Arial, sans-serif; padding: 16px; }
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
    .pager { display: flex; gap: 10px; align-items: center; margin-top: 12px; }
    .muted { color: #666; }
    a.button { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; text-decoration: none; }
    a.button.disabled { pointer-events: none; opacity: 0.5; }
  </style>
</head>
<body>

<h1>Clubs</h1>

<form class="toolbar" method="get" th:action="@{/clubs}">
    <label>
        Active:
        <select name="active">
            <option th:selected="${active == null}" value="">All</option>
            <option th:selected="${active == true}" value="true">Active</option>
            <option th:selected="${active == false}" value="false">Inactive</option>
        </select>
    </label>

    <label>
        Size:
        <select name="size">
            <option th:selected="${size == 5}" value="5">5</option>
            <option th:selected="${size == 10}" value="10">10</option>
            <option th:selected="${size == 20}" value="20">20</option>
        </select>
    </label>

    <input type="hidden" name="sort" th:value="${sort}" />
    <input type="hidden" name="page" value="0" />

    <button type="submit">Filter</button>
</form>

<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Room</th>
        <th>Status</th>
    </tr>
    </thead>

    <tbody>
    <tr th:if="${#lists.isEmpty(clubs)}">
        <td colspan="3" class="muted">No clubs found.</td>
    </tr>

    <tr th:each="c : ${clubs}">
        <td th:text="${c.name}">Chess Club</td>
        <td th:text="${c.room}">C02</td>
        <td>
            <span th:text="${c.isActive ? 'Active' : 'Inactive'}">Active</span>
        </td>
    </tr>
    </tbody>
</table>

<div class="pager">
    <a class="button"
       th:classappend="${page.first} ? ' disabled' : ''"
       th:href="@{/clubs(active=${active}, page=${page.number - 1}, size=${size}, sort=${sort})}">
        Prev
    </a>

    <span class="muted">
    Page <span th:text="${page.number + 1}">1</span> / <span th:text="${page.totalPages}">1</span>
    • Total: <span th:text="${page.totalElements}">0</span>
  </span>

    <a class="button"
       th:classappend="${page.last} ? ' disabled' : ''"
       th:href="@{/clubs(active=${active}, page=${page.number + 1}, size=${size}, sort=${sort})}">
        Next
    </a>
</div>

</body>
</html>
