<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | ClubsHub</title>
    <link th:href="@{/assets/logo.png}" rel="icon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/login.css}" />
  </head>
  <body>
    <main class="login-page">
      <section class="login-card">
        <div class="brand">
          <div class="brand-mark">
            <img th:src="@{/assets/logo.png}" alt="ClubsHub logo" />
          </div>
          <div class="brand-text">
            <span>ClubsHub</span>
            <span>Student Life</span>
          </div>
        </div>

        <h1>Sign in</h1>
        <p>Access your clubs dashboard and manage your events.</p>

        <div class="alert" th:if="${error}" th:text="${error}"></div>
        <div class="alert success" th:if="${success}" th:text="${success}"></div>

        <form th:action="@{/login}" method="post" th:object="${loginRequest}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            th:field="*{email}"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />

          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            th:field="*{password}"
            autocomplete="current-password"
            placeholder="password"
            required
          />

          <button class="cta-button" type="submit">Login</button>
        </form>

        <a class="back-link" th:href="@{/register}">New here? Create a student account</a>
        <a class="back-link" th:href="@{/clubs}">Back to clubs</a>
      </section>
    </main>
  </body>
</html>
