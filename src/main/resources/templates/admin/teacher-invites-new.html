<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invite Teachers | ClubsHub Admin</title>
    <link th:href="@{/assets/logo.png}" rel="icon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" th:href="@{/css/site-chrome.css}" />
  </head>
  <body class="bg-light">
    <header th:replace="fragments/site-chrome :: siteHeader"></header>

    <main class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-9 col-xl-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <h1 class="h4 mb-2">Invite Teachers</h1>
              <p class="text-muted mb-4">
                Send multiple teacher invites in one request.
              </p>

              <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
              <div class="alert alert-warning" th:if="${warning}" th:text="${warning}"></div>
              <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>

              <form th:action="@{/admin/teacher-invites}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                <label class="form-label" for="emailsText">Teacher emails</label>
                <textarea
                  class="form-control"
                  id="emailsText"
                  name="emailsText"
                  rows="6"
                  placeholder="teacher1@school.bg&#10;teacher2@school.bg"
                  th:text="${emailsText}"
                ></textarea>
                <div class="form-text">
                  Paste one email per line (commas/semicolons also supported).
                </div>

                <button class="btn btn-primary mt-3" type="submit">Send Invites</button>
              </form>
            </div>
          </div>

          <div class="card shadow-sm mt-4" th:if="${invites != null and !#lists.isEmpty(invites)}">
            <div class="card-header bg-white">
              <strong>Invites Sent</strong>
            </div>
            <div class="table-responsive">
              <table class="table table-striped mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col">Email</th>
                    <th scope="col">Expires At</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="invite : ${invites}">
                    <td th:text="${invite.email}">teacher@school.bg</td>
                    <td th:text="${invite.expiresAt}">2026-02-06T10:30:00Z</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
    <footer th:replace="fragments/site-chrome :: siteFooter"></footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
