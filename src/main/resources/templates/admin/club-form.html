<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | ClubsHub Admin'">Club Form | ClubsHub Admin</title>
    <link th:href="@{/assets/logo.png}" rel="icon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/site-chrome.css}" />
    <link rel="stylesheet" th:href="@{/css/admin-shell.css}" />
    <link rel="stylesheet" th:href="@{/css/club-form.css}" />
  </head>
  <body th:replace="~{fragments/admin-shell :: adminShell('club-form-page', ~{::adminPageContent}, ~{::pageScripts})}">
    <th:block th:fragment="adminPageContent">
      <div class="club-form-main">
        <div class="container club-form-container">
        <section class="club-form-header">
          <a class="club-form-back" th:href="@{/admin/clubs}">Back to Clubs</a>
          <p class="club-form-tag">Admin Workspace</p>
          <h1 th:text="${pageTitle}">Create Club</h1>
          <p class="club-form-subtitle" th:text="${pageSubtitle}">
            Add a new club with schedule and contact details.
          </p>
        </section>

        <div
          id="club-form-message"
          class="club-form-message"
          role="alert"
          th:if="${errorMessage}"
          th:text="${errorMessage}"
        ></div>

        <form
          id="club-form"
          class="club-form"
          novalidate
          method="post"
          th:attr="enctype=${mode == 'create'} ? 'multipart/form-data' : null"
          th:action="${mode == 'edit'} ? @{/admin/clubs/{id}/edit(id=${clubId})} : @{/admin/clubs/create}"
        >
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="club-form-grid">
            <label class="club-field club-field--full" for="club-name">
              <span>Club Name <strong>*</strong></span>
              <input
                id="club-name"
                name="name"
                type="text"
                required
                maxlength="160"
                autocomplete="organization"
                th:value="${clubName}"
              />
            </label>

            <label class="club-field club-field--full" for="club-description">
              <span>Description <strong>*</strong></span>
              <textarea
                id="club-description"
                name="description"
                required
                maxlength="5000"
                th:text="${clubDescription}"
              ></textarea>
            </label>

            <label class="club-field" for="club-scheduleText">
              <span>Schedule Text</span>
              <input
                id="club-scheduleText"
                name="scheduleText"
                type="text"
                maxlength="2000"
                th:value="${clubScheduleText}"
              />
            </label>

            <label class="club-field" for="club-room">
              <span>Room</span>
              <input
                id="club-room"
                name="room"
                type="text"
                maxlength="80"
                th:value="${clubRoom}"
              />
            </label>

            <label class="club-field" for="club-contactEmail">
              <span>Contact Email</span>
              <input
                id="club-contactEmail"
                name="contactEmail"
                type="email"
                maxlength="255"
                autocomplete="email"
                th:value="${clubContactEmail}"
              />
            </label>

            <label class="club-field" for="club-contactPhone">
              <span>Contact Phone</span>
              <input
                id="club-contactPhone"
                name="contactPhone"
                type="text"
                maxlength="40"
                autocomplete="tel"
                th:value="${clubContactPhone}"
              />
            </label>
          </div>

          <th:block th:if="${mode == 'create'}">
            <div class="club-form-grid club-form-grid--uploads">
              <label class="club-field" for="club-mainImage">
                <span>Main Image</span>
                <input
                  id="club-mainImage"
                  name="mainImage"
                  type="file"
                  accept="image/*"
                />
                <small class="club-field__hint">Upload a single main image for the club.</small>
              </label>

              <label class="club-field" for="club-teacherId">
                <span>Teacher</span>
                <select
                  id="club-teacherId"
                  name="teacherId"
                  th:disabled="${!teacherOptionsAvailable}"
                >
                  <option value="">No teacher selected</option>
                  <option
                    th:each="teacher : ${teacherOptions}"
                    th:value="${teacher.id}"
                    th:selected="${selectedTeacherId != null and selectedTeacherId == teacher.id}"
                    th:text="${teacher.fullName}"
                  >
                    Teacher Name
                  </option>
                </select>
                <small class="club-field__hint" th:if="${teacherOptionsAvailable}">
                  Teacher assignment is optional during club creation.
                </small>
                <small class="club-field__hint" th:unless="${teacherOptionsAvailable}">
                  Teacher options are not available right now. You can still create the club without assigning one.
                </small>
              </label>

              <label class="club-field club-field--full" for="club-mediaFiles">
                <span>Club Media</span>
                <input
                  id="club-mediaFiles"
                  name="mediaFiles"
                  type="file"
                  multiple
                />
                <small class="club-field__hint">Add any extra images or files to upload during creation.</small>
              </label>
            </div>

            <label class="club-switch-row" for="club-teacherIsPrimary-toggle">
              <span class="club-switch-row__label">Teacher Is Primary</span>
              <span class="club-switch">
                <input
                  id="club-teacherIsPrimary"
                  name="teacherIsPrimary"
                  type="hidden"
                  th:value="${selectedTeacherId != null ? (selectedTeacherIsPrimary ? 'true' : 'false') : ''}"
                />
                <input
                  id="club-teacherIsPrimary-toggle"
                  type="checkbox"
                  th:checked="${selectedTeacherIsPrimary}"
                />
                <span class="club-switch__track">
                  <span class="club-switch__thumb"></span>
                </span>
              </span>
            </label>
          </th:block>

          <label class="club-switch-row" for="club-isActive">
            <span class="club-switch-row__label">Is Active</span>
            <span class="club-switch">
              <input
                id="club-isActive"
                name="isActive"
                type="checkbox"
                th:checked="${clubIsActive}"
              />
              <span class="club-switch__track">
                <span class="club-switch__thumb"></span>
              </span>
            </span>
          </label>

          <div class="club-form-actions">
            <a class="club-button club-button--ghost" th:href="@{/admin/clubs}">Cancel</a>
            <button
              id="club-form-submit"
              class="club-button club-button--primary"
              type="submit"
              th:text="${submitLabel}"
            >
              Create Club
            </button>
          </div>
        </form>
        </div>
      </div>
    </th:block>

    <th:block th:fragment="pageScripts">
      <script th:if="${mode == 'create'}">
        (() => {
          const teacherSelect = document.getElementById("club-teacherId");
          const teacherPrimaryToggle = document.getElementById("club-teacherIsPrimary-toggle");
          const teacherPrimaryField = document.getElementById("club-teacherIsPrimary");

          if (!teacherSelect || !teacherPrimaryToggle || !teacherPrimaryField) {
            return;
          }

          const syncTeacherPrimary = () => {
            const hasTeacher = teacherSelect.value.trim() !== "";

            teacherPrimaryToggle.disabled = !hasTeacher;
            teacherPrimaryField.disabled = !hasTeacher;

            if (!hasTeacher) {
              teacherPrimaryField.value = "";
              return;
            }

            teacherPrimaryField.value = teacherPrimaryToggle.checked ? "true" : "false";
          };

          teacherSelect.addEventListener("change", syncTeacherPrimary);
          teacherPrimaryToggle.addEventListener("change", syncTeacherPrimary);

          syncTeacherPrimary();
        })();
      </script>
    </th:block>
  </body>
</html>
