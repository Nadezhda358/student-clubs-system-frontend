<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${pageTitle} + ' | ClubsHub Admin'">Club Form | ClubsHub Admin</title>
    <link th:href="@{/assets/logo.png}" rel="icon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/site-chrome.css}" />
    <link rel="stylesheet" th:href="@{/css/club-form.css}" />
  </head>
  <body class="club-form-page">
    <header th:replace="fragments/site-chrome :: siteHeader"></header>

    <main class="club-form-main">
      <div class="container club-form-container">
        <section class="club-form-header">
          <a class="club-form-back" th:href="@{/admin/clubs}">Back to Clubs</a>
          <p class="club-form-tag">Admin Workspace</p>
          <h1 th:text="${pageTitle}">Create Club</h1>
          <p class="club-form-subtitle" th:text="${pageSubtitle}">
            Add a new club with schedule and contact details.
          </p>
        </section>

        <div
          id="club-form-message"
          class="club-form-message"
          role="alert"
          th:if="${errorMessage}"
          th:text="${errorMessage}"
        ></div>

        <form
          id="club-form"
          class="club-form"
          novalidate
          method="post"
          th:action="${mode == 'edit'} ? @{/admin/clubs/{id}/edit(id=${clubId})} : @{/admin/clubs/create}"
        >
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

          <div class="club-form-grid">
            <label class="club-field club-field--full" for="club-name">
              <span>Club Name <strong>*</strong></span>
              <input
                id="club-name"
                name="name"
                type="text"
                required
                maxlength="160"
                autocomplete="organization"
                th:value="${clubName}"
              />
            </label>

            <label class="club-field club-field--full" for="club-description">
              <span>Description</span>
              <textarea
                id="club-description"
                name="description"
                maxlength="5000"
                th:text="${clubDescription}"
              ></textarea>
            </label>

            <label class="club-field" for="club-scheduleText">
              <span>Schedule Text</span>
              <input
                id="club-scheduleText"
                name="scheduleText"
                type="text"
                maxlength="2000"
                th:value="${clubScheduleText}"
              />
            </label>

            <label class="club-field" for="club-room">
              <span>Room</span>
              <input
                id="club-room"
                name="room"
                type="text"
                maxlength="80"
                th:value="${clubRoom}"
              />
            </label>

            <label class="club-field" for="club-contactEmail">
              <span>Contact Email</span>
              <input
                id="club-contactEmail"
                name="contactEmail"
                type="email"
                maxlength="255"
                autocomplete="email"
                th:value="${clubContactEmail}"
              />
            </label>

            <label class="club-field" for="club-contactPhone">
              <span>Contact Phone</span>
              <input
                id="club-contactPhone"
                name="contactPhone"
                type="text"
                maxlength="40"
                autocomplete="tel"
                th:value="${clubContactPhone}"
              />
            </label>
          </div>

          <label class="club-switch-row" for="club-isActive">
            <span class="club-switch-row__label">Is Active</span>
            <span class="club-switch">
              <input
                id="club-isActive"
                name="isActive"
                type="checkbox"
                th:checked="${clubIsActive}"
              />
              <span class="club-switch__track">
                <span class="club-switch__thumb"></span>
              </span>
            </span>
          </label>

          <div class="club-form-actions">
            <a class="club-button club-button--ghost" th:href="@{/admin/clubs}">Cancel</a>
            <button
              id="club-form-submit"
              class="club-button club-button--primary"
              type="submit"
              th:text="${submitLabel}"
            >
              Create Club
            </button>
          </div>
        </form>
      </div>
    </main>

    <footer th:replace="fragments/site-chrome :: siteFooter"></footer>
  </body>
</html>
