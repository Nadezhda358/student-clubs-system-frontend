<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Clubs | ClubsHub Admin</title>
    <link th:href="@{/assets/logo.png}" rel="icon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Sora:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/site-chrome.css}" />
    <link rel="stylesheet" th:href="@{/css/admin-clubs.css}" />
  </head>
  <body class="admin-clubs-page">
    <header th:replace="fragments/site-chrome :: siteHeader"></header>

    <main class="admin-clubs">
      <div class="container admin-clubs__container">
        <section class="admin-clubs__hero">
          <div>
            <p class="admin-clubs__tag">Admin Workspace</p>
            <h1>Manage Student Clubs</h1>
            <p class="admin-clubs__subtitle">
              Create new clubs or update current records in one place.
            </p>
          </div>
          <a class="admin-clubs__create-button" th:href="@{/admin/clubs/create}">
            Create Club
          </a>
        </section>

        <div class="admin-alert admin-alert--success" th:if="${successMessage}" th:text="${successMessage}"></div>

        <section class="admin-clubs__list" th:if="${!#lists.isEmpty(clubs)}">
          <article class="admin-club-row" th:each="club : ${clubs}">
            <div class="admin-club-row__main">
              <h2 th:text="${club.name}">Club Name</h2>
              <p>
                <span>Room:</span>
                <strong th:text="${club.room != null and !#strings.isEmpty(club.room) ? club.room : 'TBD'}">A-204</strong>
              </p>
            </div>
            <div class="admin-club-row__status">
              <span class="status-chip" th:classappend="${club.isActive} ? ' is-active' : ' is-inactive'">
                <span th:text="${club.isActive} ? 'Active' : 'Inactive'">Active</span>
              </span>
            </div>
            <div class="admin-club-row__actions">
              <a class="ghost-link" th:href="@{/clubs/{id}(id=${club.id})}">View</a>
              <a class="primary-link" th:href="@{/admin/clubs/{id}/edit(id=${club.id})}">Edit</a>
            </div>
          </article>
        </section>

        <section class="admin-clubs__empty" th:if="${#lists.isEmpty(clubs)}">
          <h2>No clubs yet</h2>
          <p>Create the first club to get started.</p>
          <a class="admin-clubs__create-button" th:href="@{/admin/clubs/create}">Create Club</a>
        </section>

        <section
          class="admin-pagination"
          th:if="${page != null and page.totalPages > 1}"
          th:with="lastIndex=${page.totalPages - 1}"
        >
          <a
            class="page-link"
            th:classappend="${page.first} ? ' disabled' : ''"
            th:href="${page.first} ? '#' : @{/admin/clubs(page=0, sort=${sort}, active=${active})}"
            th:attr="aria-disabled=${page.first}"
          >
            First
          </a>
          <a
            class="page-link"
            th:classappend="${page.first} ? ' disabled' : ''"
            th:href="${page.first} ? '#' : @{/admin/clubs(page=${page.number - 1}, sort=${sort}, active=${active})}"
            th:attr="aria-disabled=${page.first}"
          >
            Previous
          </a>
          <span class="page-state">
            Page <strong th:text="${page.number + 1}">1</strong> of
            <strong th:text="${page.totalPages}">1</strong>
          </span>
          <a
            class="page-link"
            th:classappend="${page.last} ? ' disabled' : ''"
            th:href="${page.last} ? '#' : @{/admin/clubs(page=${page.number + 1}, sort=${sort}, active=${active})}"
            th:attr="aria-disabled=${page.last}"
          >
            Next
          </a>
          <a
            class="page-link"
            th:classappend="${page.last} ? ' disabled' : ''"
            th:href="${page.last} ? '#' : @{/admin/clubs(page=${lastIndex}, sort=${sort}, active=${active})}"
            th:attr="aria-disabled=${page.last}"
          >
            Last
          </a>
        </section>
      </div>
    </main>

    <footer th:replace="fragments/site-chrome :: siteFooter"></footer>
  </body>
</html>
