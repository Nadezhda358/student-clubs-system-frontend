<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
  <body>
    <header class="site-header" th:fragment="siteHeader">
      <div class="container">
        <nav class="site-navbar">
          <div class="brand">
            <div class="brand-mark">
              <img th:src="@{/assets/logo.png}" alt="ClubsHub logo" />
            </div>
            <div class="brand-text">
              <span>ClubsHub</span>
              <span>Student Life</span>
            </div>
          </div>

          <div class="nav-links">
            <a
              th:href="@{/clubs}"
              th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/clubs')} ? ' active' : ''"
            >
              Clubs
            </a>
            <a
              th:if="${sessionUser != null and sessionUser.role == T(com.school.ppmg.student_clubs_system_client.enums.UserRole).ADMIN}"
              th:href="@{/admin/clubs}"
              th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/admin')} ? ' active' : ''"
            >
              Admin
            </a>
            <a
              th:if="${sessionUser != null and sessionUser.role == T(com.school.ppmg.student_clubs_system_client.enums.UserRole).TEACHER}"
              th:href="@{/teacher}"
              th:classappend="${currentPath != null and #strings.startsWith(currentPath, '/teacher')} ? ' active' : ''"
            >
              Teacher
            </a>
          </div>

          <div class="nav-actions">
            <a class="ghost-button" th:if="${sessionUser == null}" th:href="@{/login}">Login</a>
            <div class="nav-user" th:if="${sessionUser != null}">
              <span class="nav-greeting" th:text="'Hello, ' + ${sessionUser.firstName}">Hello, User</span>
              <form class="logout-form" th:action="@{/logout}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button class="ghost-button" type="submit">Logout</button>
              </form>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <footer class="page-footer" th:fragment="siteFooter">
      <div class="container">
        <p>&copy; 2026 ClubsHub. Built for student communities.</p>
      </div>
    </footer>
  </body>
</html>
